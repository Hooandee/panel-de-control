name: prerelease

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Build and package prerelease
        env:
          BRANCH: ${{ github.ref_name }}
          PLUGIN_NAME: Panel de Control
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BASE="$(node -p "require('./package.json').version")"
          export VERSION="${BASE}-dev.${SHORT_SHA}"
          node -e "const f='package.json';const p=require('./'+f);p.version=process.env.VERSION;require('fs').writeFileSync(f, JSON.stringify(p,null,2)+'\n')"
          echo "Building $PLUGIN_NAME v${VERSION} from ${BRANCH}"
          pnpm install --frozen-lockfile
          pnpm build
          rm -f dist/*.map
          staging=$(mktemp -d)
          mkdir -p "$staging/$PLUGIN_NAME"
          cp -rL dist main.py plugin.json package.json README.md README.en.md LICENSE py_modules assets bin "$staging/$PLUGIN_NAME"
          (cd "$staging" && zip -r "$GITHUB_WORKSPACE/$PLUGIN_NAME.zip" "$PLUGIN_NAME")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Panel de Control-${{ env.VERSION }}
          path: Panel de Control.zip
          retention-days: 14
