name: release-please

on:
  push:
    branches: [main]

# No token permissions by default; the job grants only what it needs.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release + upload the asset
      pull-requests: write # maintain the release PR
      id-token: write # keyless (OIDC) signing for build provenance
      attestations: write # record the provenance attestation
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Build + attach the plugin zip only when a release was just tagged.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: ${{ steps.release.outputs.release_created }}
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 20
          cache: pnpm
      # Build the generic AMD power fallback from source, pinned. libpci is provided
      # by a self-contained static build (no udev/zlib/kmod), so the final binary is
      # fully static and runs on any target without host libraries. Placed at
      # bin/ryzenadj, where the backend resolves it. A build failure fails the release.
      # The recipe lives in scripts/build-ryzenadj.sh so it can also be run off-CI.
      - name: Build bundled power binary
        if: ${{ steps.release.outputs.release_created }}
        env:
          RYZENADJ_TAG: v0.19.0
          PCIUTILS_TAG: v3.13.0
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config
          bash scripts/build-ryzenadj.sh bin

      # The binary must be a valid executable with no unresolved libraries. A
      # hardware-init failure on the runner (no AMD APU) is expected and does not
      # fail the check; a loader/exec failure does.
      - name: Verify bundled power binary
        if: ${{ steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          test -x bin/ryzenadj
          file bin/ryzenadj | grep -q 'ELF 64-bit'
          if ldd bin/ryzenadj 2>&1 | grep -q 'not found'; then
            echo "::error::bundled binary has unresolved shared libraries"; ldd bin/ryzenadj; exit 1
          fi
          set +e
          out="$(timeout 30 bin/ryzenadj -i 2>&1)"; rc=$?
          set -e
          echo "smoke (rc=$rc):"; echo "$out"
          case "$rc" in
            124) echo "::error::bundled binary timed out"; exit 1 ;;
            126|127) echo "::error::bundled binary failed to execute"; exit 1 ;;
          esac
          if echo "$out" | grep -qi 'error while loading shared libraries'; then
            echo "::error::bundled binary loader error"; exit 1
          fi

      - name: Build and package
        if: ${{ steps.release.outputs.release_created }}
        env:
          PLUGIN_NAME: Panel de Control
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          rm -f dist/*.map
          staging=$(mktemp -d)
          mkdir -p "$staging/$PLUGIN_NAME"
          cp -rL dist main.py plugin.json package.json README.md README.en.md LICENSE py_modules assets bin "$staging/$PLUGIN_NAME"
          (cd "$staging" && zip -r "$GITHUB_WORKSPACE/$PLUGIN_NAME.zip" "$PLUGIN_NAME")

      # Attach the artifact first, so provenance signing can never block the release
      # asset (e.g. build provenance is unavailable on private repos).
      - name: Upload zip to the release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
          PLUGIN_NAME: Panel de Control
        run: gh release upload "$TAG" "$PLUGIN_NAME.zip" --clobber

      # Sign the exact release artifact with build provenance (Sigstore, keyless).
      # Anyone can verify the zip really came from this workflow/commit with:
      #   gh attestation verify "Panel de Control.zip" --repo Hooandee/panel-de-control
      # This is what protects users even if the GitHub account or a token leaks:
      # a zip published outside this pipeline has no valid provenance.
      # Skipped while the repo is private (attestations require a public repo);
      # it turns on automatically once the repo is made public.
      - name: Attest build provenance
        if: ${{ steps.release.outputs.release_created && !github.event.repository.private }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "Panel de Control.zip"
